<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Vendas Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>

    <style>
        :root { --navy: #001f3f; --green: #28a745; --yellow: #ffc107; --red: #dc3545; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--navy); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        
        /* Formulário em Grade */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        
        #btnSalvar { grid-column: 1 / -1; background: var(--green); color: white; border: none; padding: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        #btnSalvar:hover { opacity: 0.9; }

        /* Tabela Responsiva */
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; font-size: 13px; }
        th { background: var(--navy); color: white; padding: 12px; text-align: center; border: 1px solid #003366; }
        td { padding: 10px; border: 1px solid #eee; text-align: center; }
        tr:nth-child(even) { background: #fafafa; }

        .tag { padding: 4px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
        .tag-boleto { background: #fff3cd; color: #856404; }
        .tag-cartao { background: #d4edda; color: #155724; }
        
        .btn-acao { border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 11px; margin: 2px; }
        .btn-edit { background: var(--yellow); color: black; }
        .btn-del { background: var(--red); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Sistema de Gestão de Vendas - 2026</h2>
    
    <form id="vendaForm">
        <div class="form-grid">
            <div class="field"><label>Dia</label><input type="number" id="dia" required></div>
            <div class="field"><label>Mês</label><input type="number" id="mes" required></div>
            <div class="field"><label>Ano</label><input type="number" id="ano" value="2026"></div>
            <div class="field"><label>Vendedor</label><input type="text" id="vendedor" placeholder="Nome" required></div>
            <div class="field"><label>Aluno</label><input type="text" id="aluno" placeholder="Nome do Aluno" required></div>
            <div class="field">
                <label>Tipo Pgto</label>
                <select id="tipoPgto">
                    <option value="BOLETO">BOLETO</option>
                    <option value="CARTÃO">CARTÃO</option>
                </select>
            </div>
            <div class="field"><label>Taxa (R$)</label><input type="text" id="taxa" placeholder="0,00"></div>
            <div class="field"><label>Boleto (R$)</label><input type="text" id="boleto" placeholder="0,00"></div>
            <div class="field"><label>Parcelas</label><input type="number" id="parcelas" value="1"></div>
            <div class="field"><label>Cartão (R$)</label><input type="text" id="cartao" placeholder="0,00"></div>
            <div class="field"><label>Curso</label><input type="text" id="curso" placeholder="Ex: Pedagogia"></div>
            <div class="field"><label>Cidade</label><input type="text" id="cidade"></div>
            <div class="field"><label>UF</label><input type="text" id="estado" maxlength="2"></div>
            <div class="field"><label>Origem</label><input type="text" id="origem"></div>
            <button type="submit" id="btnSalvar">REGISTRAR VENDA NO PAINEL</button>
        </div>
    </form>

    <div class="table-wrapper">
        <table id="tabelaVendas">
            <thead>
                <tr>
                    <th>DATA</th>
                    <th>VENDEDOR</th>
                    <th>ALUNO</th>
                    <th>PGTO</th>
                    <th>BOLETO</th>
                    <th>CARTÃO</th>
                    <th>CURSO</th>
                    <th>LOCAL</th>
                    <th>AÇÕES</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    // Configuração do seu Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDDFh0bzpV0aMvMcp6Dp7626EeJdXbstlw",
      authDomain: "sistema-de-vendas-8cdb9.firebaseapp.com",
      projectId: "sistema-de-vendas-8cdb9",
      storageBucket: "sistema-de-vendas-8cdb9.firebasestorage.app",
      messagingSenderId: "570383573044",
      appId: "1:570383573044:web:672531ad3af5341e1c2a61"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let editId = null;

    const form = document.getElementById('vendaForm');
    const btnSalvar = document.getElementById('btnSalvar');

    // SALVAR OU ATUALIZAR
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        btnSalvar.disabled = true;

        const dados = {
            dia: document.getElementById('dia').value,
            mes: document.getElementById('mes').value,
            ano: document.getElementById('ano').value,
            vendedor: document.getElementById('vendedor').value,
            aluno: document.getElementById('aluno').value,
            tipoPgto: document.getElementById('tipoPgto').value,
            taxa: document.getElementById('taxa').value,
            boleto: document.getElementById('boleto').value,
            parcelas: document.getElementById('parcelas').value,
            cartao: document.getElementById('cartao').value,
            curso: document.getElementById('curso').value,
            cidade: document.getElementById('cidade').value,
            estado: document.getElementById('estado').value,
            origem: document.getElementById('origem').value,
            dataRegistro: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            if (editId) {
                await db.collection("vendas").doc(editId).update(dados);
                alert("Venda atualizada!");
                editId = null;
                btnSalvar.innerText = "REGISTRAR VENDA NO PAINEL";
                btnSalvar.style.background = "#28a745";
            } else {
                await db.collection("vendas").add(dados);
                alert("Venda salva com sucesso!");
            }
            form.reset();
            document.getElementById('ano').value = "2026";
        } catch (error) {
            alert("Erro: " + error.message);
        }
        btnSalvar.disabled = false;
    });

    // CARREGAR PARA EDITAR
    window.prepararEdicao = (id, jsonDados) => {
        editId = id;
        const d = JSON.parse(decodeURIComponent(jsonDados));
        
        document.getElementById('dia').value = d.dia;
        document.getElementById('mes').value = d.mes;
        document.getElementById('vendedor').value = d.vendedor;
        document.getElementById('aluno').value = d.aluno;
        document.getElementById('tipoPgto').value = d.tipoPgto;
        document.getElementById('taxa').value = d.taxa;
        document.getElementById('boleto').value = d.boleto;
        document.getElementById('parcelas').value = d.parcelas;
        document.getElementById('cartao').value = d.cartao;
        document.getElementById('curso').value = d.curso;
        document.getElementById('cidade').value = d.cidade;
        document.getElementById('estado').value = d.estado;
        document.getElementById('origem').value = d.origem;

        btnSalvar.innerText = "CONFIRMAR ALTERAÇÕES";
        btnSalvar.style.background = "#ffc107";
        window.scrollTo(0,0);
    };

    // EXCLUIR
    window.excluirVenda = async (id) => {
        if(confirm("Deseja realmente excluir esta venda?")) {
            await db.collection("vendas").doc(id).delete();
        }
    };

    // ESCUTAR O BANCO EM TEMPO REAL
    db.collection("vendas").orderBy("dataRegistro", "desc").onSnapshot((snapshot) => {
        const corpoTabela = document.querySelector("#tabelaVendas tbody");
        corpoTabela.innerHTML = "";
        
        snapshot.forEach((doc) => {
            const v = doc.data();
            const id = doc.id;
            const jsonDados = encodeURIComponent(JSON.stringify(v));
            const classeTag = v.tipoPgto === "BOLETO" ? "tag-boleto" : "tag-cartao";

            corpoTabela.innerHTML += `
                <tr>
                    <td>${v.dia}/${v.mes}/${v.ano}</td>
                    <td>${v.vendedor}</td>
                    <td>${v.aluno}</td>
                    <td><span class="tag ${classeTag}">${v.tipoPgto}</span></td>
                    <td>R$ ${v.boleto || '0,00'}</td>
                    <td>R$ ${v.cartao || '0,00'}</td>
                    <td>${v.curso}</td>
                    <td>${v.cidade}/${v.estado}</td>
                    <td>
                        <button class="btn-acao btn-edit" onclick="prepararEdicao('${id}', '${jsonDados}')">EDITAR</button>
                        <button class="btn-acao btn-del" onclick="excluirVenda('${id}')">EXCLUIR</button>
                    </td>
                </tr>
            `;
        });
    });
</script>

</body>
</html>
