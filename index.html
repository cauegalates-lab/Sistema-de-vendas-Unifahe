<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Vendas Oficial - 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --navy: #001f3f; --green: #28a745; --yellow: #ffc107; --red: #dc3545; --blue: #007bff; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--navy); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; color: #666; margin-bottom: 3px; text-transform: uppercase; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .btn-group { display: flex; gap: 10px; grid-column: 1 / -1; }
        #btnSalvar { flex: 2; background: var(--green); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        #btnExportar { flex: 1; background: var(--blue); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: 12px; }
        th { background: var(--navy); color: white; padding: 10px; border: 1px solid #003366; }
        td { padding: 8px; border: 1px solid #eee; text-align: center; }
        .btn-acao { border: none; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Painel de Controle de Vendas</h2>
    <form id="vendaForm">
        <div class="form-grid">
            <div class="field"><label>Dia</label><input type="number" id="dia" required></div>
            <div class="field"><label>Mês</label><input type="number" id="mes" required></div>
            <div class="field"><label>Ano</label><input type="number" id="ano" value="2026"></div>
            <div class="field"><label>Vendedor</label><input type="text" id="vendedor" required></div>
            <div class="field"><label>Aluno</label><input type="text" id="aluno" required></div>
            <div class="field"><label>Pgto</label><select id="tipoPgto"><option value="BOLETO">BOLETO</option><option value="CARTÃO">CARTÃO</option></select></div>
            <div class="field"><label>Taxa R$</label><input type="text" id="taxa"></div>
            <div class="field"><label>Boleto R$</label><input type="text" id="boleto"></div>
            <div class="field"><label>Parc.</label><input type="number" id="parcelas" value="1"></div>
            <div class="field"><label>Cartão R$</label><input type="text" id="cartao"></div>
            <div class="field"><label>Curso</label><input type="text" id="curso"></div>
            <div class="field"><label>Cidade</label><input type="text" id="cidade"></div>
            <div class="field"><label>UF</label><input type="text" id="estado"></div>
            <div class="field"><label>Origem</label><input type="text" id="origem"></div>
            <div class="btn-group">
                <button type="submit" id="btnSalvar">SALVAR NO SISTEMA</button>
                <button type="button" id="btnExportar" onclick="exportarExcel()">EXTRAIR PLANILHA (Excel)</button>
            </div>
        </div>
    </form>

    <div class="table-wrapper">
        <table id="tabelaVendas">
            <thead>
                <tr>
                    <th>DATA</th><th>VENDEDOR</th><th>ALUNO</th><th>PGTO</th><th>TAXA</th>
                    <th>BOLETO</th><th>PARC.</th><th>CARTÃO</th><th>CURSO</th><th>LOCAL</th><th>ORIGEM</th><th>AÇÕES</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDDFh0bzpV0aMvMcp6Dp7626EeJdXbstlw",
      authDomain: "sistema-de-vendas-8cdb9.firebaseapp.com",
      projectId: "sistema-de-vendas-8cdb9",
      storageBucket: "sistema-de-vendas-8cdb9.firebasestorage.app",
      messagingSenderId: "570383573044",
      appId: "1:570383573044:web:672531ad3af5341e1c2a61"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let editId = null;
    let vendasAtuais = []; // Para backup

    document.getElementById('vendaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSalvar');
        btn.disabled = true;

        const dados = {
            dia: document.getElementById('dia').value,
            mes: document.getElementById('mes').value,
            ano: document.getElementById('ano').value,
            vendedor: document.getElementById('vendedor').value,
            aluno: document.getElementById('aluno').value,
            tipoPgto: document.getElementById('tipoPgto').value,
            taxa: document.getElementById('taxa').value,
            boleto: document.getElementById('boleto').value,
            parcelas: document.getElementById('parcelas').value,
            cartao: document.getElementById('cartao').value,
            curso: document.getElementById('curso').value,
            cidade: document.getElementById('cidade').value,
            estado: document.getElementById('estado').value,
            origem: document.getElementById('origem').value,
            dataRef: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            if (editId) {
                await db.collection("vendas").doc(editId).update(dados);
                editId = null;
                btn.innerText = "SALVAR NO SISTEMA";
                btn.style.background = "#28a745";
            } else {
                await db.collection("vendas").add(dados);
            }
            e.target.reset();
            document.getElementById('ano').value = "2026";
        } catch (err) { alert(err.message); }
        btn.disabled = false;
    });

    // FUNÇÃO PARA EXPORTAR PLANILHA (CSV)
    window.exportarExcel = () => {
        if (vendasAtuais.length === 0) return alert("Nenhuma venda para exportar.");
        
        let csv = "Data;Vendedor;Aluno;Pgto;Taxa;Boleto;Parcelas;Cartao;Curso;Cidade;UF;Origem\n";
        vendasAtuais.forEach(v => {
            csv += `${v.dia}/${v.mes}/${v.ano};${v.vendedor};${v.aluno};${v.tipoPgto};${v.taxa};${v.boleto};${v.parcelas};${v.cartao};${v.curso};${v.cidade};${v.estado};${v.origem}\n`;
        });

        const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "Relatorio_Vendas_2026.csv";
        link.click();
    };

    window.prepararEdicao = (id, json) => {
        editId = id;
        const d = JSON.parse(decodeURIComponent(json));
        document.getElementById('dia').value = d.dia;
        document.getElementById('mes').value = d.mes;
        document.getElementById('vendedor').value = d.vendedor;
        document.getElementById('aluno').value = d.aluno;
        document.getElementById('tipoPgto').value = d.tipoPgto;
        document.getElementById('taxa').value = d.taxa || "";
        document.getElementById('boleto').value = d.boleto || "";
        document.getElementById('parcelas').value = d.parcelas || "1";
        document.getElementById('cartao').value = d.cartao || "";
        document.getElementById('curso').value = d.curso || "";
        document.getElementById('cidade').value = d.cidade || "";
        document.getElementById('estado').value = d.estado || "";
        document.getElementById('origem').value = d.origem || "";
        
        const btn = document.getElementById('btnSalvar');
        btn.innerText = "ATUALIZAR DADOS";
        btn.style.background = "#ffc107";
        window.scrollTo(0,0);
    };

    window.excluirVenda = async (id) => {
        if(confirm("Excluir venda permanentemente?")) await db.collection("vendas").doc(id).delete();
    };

    // ESCUTA O BANCO - Busca por dataRegistro ou dataRef (para não sumir nada)
    db.collection("vendas").onSnapshot((snap) => {
        const corpo = document.querySelector("#tabelaVendas tbody");
        corpo.innerHTML = "";
        vendasAtuais = [];
        
        snap.forEach(doc => {
            const v = doc.data();
            vendasAtuais.push(v);
            const id = doc.id;
            const json = encodeURIComponent(JSON.stringify(v));
            corpo.innerHTML += `<tr>
                <td>${v.dia}/${v.mes}/${v.ano}</td>
                <td>${v.vendedor}</td>
                <td>${v.aluno}</td>
                <td>${v.tipoPgto}</td>
                <td>${v.taxa}</td><td>${v.boleto}</td><td>${v.parcelas}</td><td>${v.cartao}</td>
                <td>${v.curso}</td><td>${v.cidade}/${v.estado}</td><td>${v.origem}</td>
                <td>
                    <button class="btn-acao" style="background:#ffc107" onclick="prepararEdicao('${id}','${json}')">ED</button>
                    <button class="btn-acao" style="background:#dc3545;color:white" onclick="excluirVenda('${id}')">X</button>
                </td>
            </tr>`;
        });
    });
</script>
</body>
</html>
