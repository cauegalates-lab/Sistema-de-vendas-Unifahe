<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Vendas e Comissões - 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --navy: #001f3f; --blue: #007bff; --green: #28a745; --yellow: #ffc107; --red: #dc3545; --gray: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gray); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 12px 25px; border: none; background: #eee; cursor: pointer; font-weight: bold; border-radius: 8px 8px 0 0; }
        .tab-btn.active { background: var(--navy); color: white; }
        .tab-content { display: none; padding: 20px 0; }
        .tab-content.active { display: block; }

        .resumo-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        .resumo-table th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 2px solid #dee2e6; }
        .resumo-table td { padding: 12px; border-bottom: 1px solid #eee; }
        .total-row { font-weight: bold; background: #e9ecef; }
        .comissao-tag { font-size: 11px; color: #666; display: block; margin-top: 4px; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: bold; color: #555; margin-bottom: 4px; text-transform: uppercase; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        
        #btnSalvar { width: 100%; background: var(--green); color: white; border: none; padding: 15px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        #btnExportar { background: var(--blue); color: white; border: none; padding: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; }

        .table-wrapper { overflow-x: auto; margin-top: 20px; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: 12px; }
        th { background: var(--navy); color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        .btn-acao { border: none; padding: 5px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--navy); margin-top: 0;">SISTEMA DE GESTÃO COMERCIAL 2026</h2>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('tab-vendas')">Lançar Vendas</button>
        <button class="tab-btn" onclick="openTab('tab-resumo')">Resumo & Comissões</button>
        <button class="tab-btn" onclick="openTab('tab-backup')">Extrair Planilha</button>
    </div>

    <div id="tab-vendas" class="tab-content active">
        <form id="vendaForm">
            <div class="form-grid">
                <div class="field"><label>Dia</label><input type="number" id="dia" required></div>
                <div class="field"><label>Mês</label><input type="number" id="mes" required></div>
                <div class="field"><label>Ano</label><input type="number" id="ano" value="2026"></div>
                <div class="field"><label>Vendedor</label><input type="text" id="vendedor" required></div>
                <div class="field"><label>Aluno</label><input type="text" id="aluno" required></div>
                <div class="field"><label>Pgto</label><select id="tipoPgto"><option value="BOLETO">BOLETO</option><option value="CARTÃO">CARTÃO</option></select></div>
                <div class="field"><label>Taxa R$</label><input type="text" id="taxa" placeholder="0.00"></div>
                <div class="field"><label>Boleto R$</label><input type="text" id="boleto" placeholder="0.00"></div>
                <div class="field"><label>Parc.</label><input type="number" id="parcelas" value="1"></div>
                <div class="field"><label>Cartão R$</label><input type="text" id="cartao" placeholder="0.00"></div>
                <div class="field"><label>Curso</label><input type="text" id="curso"></div>
                <div class="field"><label>Cidade</label><input type="text" id="cidade"></div>
                <div class="field"><label>UF</label><input type="text" id="estado" maxlength="2"></div>
                <div class="field"><label>Origem</label><input type="text" id="origem"></div>
            </div>
            <button type="submit" id="btnSalvar">SALVAR NO BANCO DE DADOS</button>
        </form>

        <div class="table-wrapper">
            <table id="tabelaVendas">
                <thead>
                    <tr>
                        <th>DATA</th><th>VENDEDOR</th><th>ALUNO</th><th>PGTO</th><th>TAXA</th><th>BOLETO</th><th>PARC.</th><th>CARTÃO</th><th>CURSO</th><th>AÇÕES</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="tab-resumo" class="tab-content">
        <h3>Resumo de Vendas e Comissões</h3>
        <table class="resumo-table">
            <thead>
                <tr>
                    <th>Vendedor</th>
                    <th>Total Cartão (Valor Líquido)</th>
                    <th>Total Boletos (Quantidade)</th>
                    <th>Comissão de Boletos (R$ 20/un)</th>
                </tr>
            </thead>
            <tbody id="corpoResumo"></tbody>
        </table>
    </div>

    <div id="tab-backup" class="tab-content" style="text-align: center; padding: 50px;">
        <h3>Gerar Cópia de Segurança das Vendas</h3>
        <button id="btnExportar" onclick="exportarPlanilha()">BAIXAR PLANILHA AGORA</button>
    </div>

</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyDDFh0bzpV0aMvMcp6Dp7626EeJdXbstlw",
      authDomain: "sistema-de-vendas-8cdb9.firebaseapp.com",
      projectId: "sistema-de-vendas-8cdb9",
      storageBucket: "sistema-de-vendas-8cdb9.firebasestorage.app",
      messagingSenderId: "570383573044",
      appId: "1:570383573044:web:672531ad3af5341e1c2a61"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let editId = null;
    let vendasAtuais = [];

    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    const paraNum = (val) => parseFloat(val?.toString().replace(',', '.')) || 0;

    function atualizarResumo() {
        const totais = {};
        vendasAtuais.forEach(v => {
            const vend = v.vendedor.toUpperCase().trim();
            const valC = paraNum(v.cartao);
            const isBoleto = v.tipoPgto === "BOLETO" ? 1 : 0;

            if (!totais[vend]) totais[vend] = { cartaoTotal: 0, qtdBoleto: 0 };
            totais[vend].cartaoTotal += valC;
            totais[vend].qtdBoleto += isBoleto;
        });

        const corpo = document.getElementById('corpoResumo');
        corpo.innerHTML = "";
        
        Object.keys(totais).sort().forEach(nome => {
            const comissaoBoleto = totais[nome].qtdBoleto * 20;
            corpo.innerHTML += `
                <tr>
                    <td>${nome}</td>
                    <td>R$ ${totais[nome].cartaoTotal.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                    <td>${totais[nome].qtdBoleto} boleto(s)</td>
                    <td style="font-weight:bold; color:var(--green)">R$ ${comissaoBoleto.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
                </tr>`;
        });
    }

    window.exportarPlanilha = () => {
        let csv = "\ufeffDia;Mes;Ano;Vendedor;Aluno;Pgto;Taxa;Boleto;Parcelas;Cartao;Curso;Cidade;UF;Origem\n";
        vendasAtuais.forEach(v => {
            const f = (t) => t ? t.toString().replace(/;/g, '-') : "";
            csv += `${f(v.dia)};${f(v.mes)};${f(v.ano)};${f(v.vendedor)};${f(v.aluno)};${f(v.tipoPgto)};${f(v.taxa)};${f(v.boleto)};${f(v.parcelas)};${f(v.cartao)};${f(v.curso)};${f(v.cidade)};${f(v.estado)};${f(v.origem)}\n`;
        });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `Vendas_Oficial_2026.csv`;
        link.click();
    };

    document.getElementById('vendaForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const dados = {
            dia: document.getElementById('dia').value, mes: document.getElementById('mes').value,
            ano: document.getElementById('ano').value, vendedor: document.getElementById('vendedor').value,
            aluno: document.getElementById('aluno').value, tipoPgto: document.getElementById('tipoPgto').value,
            taxa: document.getElementById('taxa').value, boleto: document.getElementById('boleto').value,
            parcelas: document.getElementById('parcelas').value, cartao: document.getElementById('cartao').value,
            curso: document.getElementById('curso').value, cidade: document.getElementById('cidade').value,
            estado: document.getElementById('estado').value, origem: document.getElementById('origem').value,
            dataRef: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (editId) {
            await db.collection("vendas").doc(editId).update(dados);
            editId = null;
            document.getElementById('btnSalvar').innerText = "SALVAR NO BANCO DE DADOS";
        } else {
            await db.collection("vendas").add(dados);
        }
        e.target.reset();
        document.getElementById('ano').value = "2026";
    });

    window.prepararEdicao = (id, json) => {
        editId = id;
        const d = JSON.parse(decodeURIComponent(json));
        document.getElementById('dia').value = d.dia; document.getElementById('mes').value = d.mes;
        document.getElementById('vendedor').value = d.vendedor; document.getElementById('aluno').value = d.aluno;
        document.getElementById('tipoPgto').value = d.tipoPgto; document.getElementById('taxa').value = d.taxa;
        document.getElementById('boleto').value = d.boleto; document.getElementById('parcelas').value = d.parcelas;
        document.getElementById('cartao').value = d.cartao; document.getElementById('curso').value = d.curso;
        document.getElementById('cidade').value = d.cidade; document.getElementById('estado').value = d.estado;
        document.getElementById('origem').value = d.origem;
        document.getElementById('btnSalvar').innerText = "ATUALIZAR REGISTRO";
        openTab('tab-vendas');
    };

    window.excluirVenda = async (id) => { if(confirm("Excluir?")) await db.collection("vendas").doc(id).delete(); };

    db.collection("vendas").orderBy("dataRef", "desc").onSnapshot((snap) => {
        const corpo = document.querySelector("#tabelaVendas tbody");
        corpo.innerHTML = "";
        vendasAtuais = [];
        snap.forEach(doc => {
            const v = doc.data(); vendasAtuais.push(v);
            const id = doc.id; const json = encodeURIComponent(JSON.stringify(v));
            corpo.innerHTML += `<tr>
                <td>${v.dia}/${v.mes}</td><td>${v.vendedor.toUpperCase()}</td><td>${v.aluno}</td><td>${v.tipoPgto}</td>
                <td>${v.taxa}</td><td>${v.boleto}</td><td>${v.parcelas}</td><td>${v.cartao}</td><td>${v.curso}</td>
                <td>
                    <button class="btn-acao" style="background:var(--yellow)" onclick="prepararEdicao('${id}','${json}')">ED</button>
                    <button class="btn-acao" style="background:var(--red);color:white" onclick="excluirVenda('${id}')">X</button>
                </td>
            </tr>`;
        });
        atualizarResumo();
    });
</script>
</body>
</html>
